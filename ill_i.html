<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:transparent;display:flex;align-items:center;justify-content:center;font-family:'Geist',sans-serif;height:100vh;overflow:hidden}
  /* ── scene: sem box, fundo funde ── */
  .scene{position:relative;width:460px;height:360px;flex-shrink:0;transform-origin:center center}
  .scene-bg{display:none}
  .grid{position:absolute;inset:0;z-index:1;background-image:linear-gradient(#C2D8F0 1px,transparent 1px),linear-gradient(90deg,#C2D8F0 1px,transparent 1px);background-size:30px 30px;opacity:.26;-webkit-mask-image:radial-gradient(circle at 50% 46%,#000 12%,transparent 56%);mask-image:radial-gradient(circle at 50% 46%,#000 12%,transparent 56%)}
  /* ── linhas SVG: chips → hub ── */
  .beam{position:absolute;inset:0;z-index:2;pointer-events:none;overflow:visible}
  /* ── hub ── */
  .hub-wrap{position:absolute;left:50%;top:46%;transform:translate(-50%,-50%);z-index:6;width:220px;height:220px;display:flex;align-items:center;justify-content:center}
  .bloom{position:absolute;width:200px;height:200px;border-radius:50%;z-index:0;background:radial-gradient(circle,rgba(115,199,225,.85) 0%,rgba(115,199,225,0) 66%);filter:blur(6px);animation:breathe 4s ease-in-out infinite}
  .ring-a{position:absolute;width:172px;height:172px;border-radius:50%;border:1px dashed rgba(95,180,230,.35);z-index:0}
  .ping{position:absolute;width:126px;height:126px;border-radius:50%;border:1.5px solid rgba(95,180,230,.5);z-index:1;animation:ping 3.6s ease-out infinite}
  .ping.b{animation-delay:1.8s}
  .outer{position:relative;z-index:2;width:124px;height:124px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 28px 60px rgba(0,40,93,.24),0 10px 22px rgba(0,40,93,.15),inset 0 0 0 1px rgba(255,255,255,.9)}
  .sphere{position:relative;width:94px;height:94px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 38% 26%,#3E7EC4 0%,#0B4486 46%,#00224F 100%);box-shadow:inset 0 -9px 18px rgba(0,6,24,.6),inset 0 9px 16px rgba(150,205,240,.45),0 6px 16px rgba(0,40,93,.3)}
  .sphere::before{content:"";position:absolute;top:8px;left:50%;transform:translateX(-50%);width:60px;height:30px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.6),rgba(255,255,255,0) 70%)}
  .core{position:relative;z-index:2;width:46px;height:46px;border-radius:13px;background:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 14px rgba(0,16,48,.5)}
  .core img{width:30px;height:auto;display:block}
  /* ── chips de integração ── */
  .chip{position:absolute;width:58px;height:58px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;z-index:5;box-shadow:0 16px 30px rgba(0,40,93,.18),0 5px 10px rgba(0,40,93,.13),inset 0 0 0 1px rgba(255,255,255,.9)}
  .chip svg{width:28px;height:28px}
  .c-tl{left:50px; top:64px;   animation:float 5s ease-in-out infinite}
  .c-tr{right:50px;top:64px;   animation:float 5s ease-in-out infinite .8s}
  .c-bl{left:50px; bottom:64px;animation:float 5s ease-in-out infinite 1.6s}
  .c-br{right:50px;bottom:64px;animation:float 5s ease-in-out infinite 2.4s}
  /* ── orbs: chips → hub (230,158) ── */
  .pulse{position:absolute;left:0;top:0;width:7px;height:7px;border-radius:50%;background:#9BE0F5;box-shadow:0 0 10px 3px rgba(120,205,240,.9),0 0 4px 1px rgba(115,199,225,.6);z-index:4}
  .p-tl{offset-path:path("M 80,92 L 230,158"); -webkit-offset-path:path("M 80,92 L 230,158"); animation:flowIn 2.6s ease-in infinite}
  .p-tr{offset-path:path("M 380,92 L 230,158");-webkit-offset-path:path("M 380,92 L 230,158");animation:flowIn 2.6s ease-in infinite .9s}
  .p-bl{offset-path:path("M 80,268 L 230,158");-webkit-offset-path:path("M 80,268 L 230,158");animation:flowIn 2.6s ease-in infinite 1.3s}
  .p-br{offset-path:path("M 380,268 L 230,158");-webkit-offset-path:path("M 380,268 L 230,158");animation:flowIn 2.6s ease-in infinite 1.9s}
  @keyframes flowIn{0%{offset-distance:0%;opacity:0}15%{opacity:1}82%{opacity:1}100%{offset-distance:100%;opacity:0}}
  @keyframes breathe{0%,100%{opacity:.45;transform:scale(.92)}50%{opacity:.82;transform:scale(1.05)}}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
  @keyframes ping{0%{transform:scale(.5);opacity:.75}80%{opacity:0}100%{transform:scale(1.85);opacity:0}}
</style></head><body>
<div class="scene">
  <div class="scene-bg"></div>
  <div class="grid"></div>

  <!-- linhas SVG: chips → hub (230,158). Gradiente: visível no chip, some no hub -->
  <svg class="beam" viewBox="0 0 460 360" xmlns="http://www.w3.org/2000/svg" overflow="visible">
    <defs>
      <linearGradient id="li1" gradientUnits="userSpaceOnUse" x1="80"  y1="92"  x2="230" y2="158"><stop offset="0" stop-color="#73C7E1" stop-opacity=".7"/><stop offset="1" stop-color="#73C7E1" stop-opacity="0"/></linearGradient>
      <linearGradient id="li2" gradientUnits="userSpaceOnUse" x1="380" y1="92"  x2="230" y2="158"><stop offset="0" stop-color="#73C7E1" stop-opacity=".7"/><stop offset="1" stop-color="#73C7E1" stop-opacity="0"/></linearGradient>
      <linearGradient id="li3" gradientUnits="userSpaceOnUse" x1="80"  y1="268" x2="230" y2="158"><stop offset="0" stop-color="#73C7E1" stop-opacity=".7"/><stop offset="1" stop-color="#73C7E1" stop-opacity="0"/></linearGradient>
      <linearGradient id="li4" gradientUnits="userSpaceOnUse" x1="380" y1="268" x2="230" y2="158"><stop offset="0" stop-color="#73C7E1" stop-opacity=".7"/><stop offset="1" stop-color="#73C7E1" stop-opacity="0"/></linearGradient>
    </defs>
    <line x1="80"  y1="92"  x2="230" y2="158" stroke="url(#li1)" stroke-width="1.1" stroke-dasharray="5 4"/>
    <line x1="380" y1="92"  x2="230" y2="158" stroke="url(#li2)" stroke-width="1.1" stroke-dasharray="5 4"/>
    <line x1="80"  y1="268" x2="230" y2="158" stroke="url(#li3)" stroke-width="1.1" stroke-dasharray="5 4"/>
    <line x1="380" y1="268" x2="230" y2="158" stroke="url(#li4)" stroke-width="1.1" stroke-dasharray="5 4"/>
    <!-- linha horizontal sutil -->
    <line x1="0" y1="158" x2="460" y2="158" stroke="#73C7E1" stroke-opacity=".12" stroke-width="1"/>
  </svg>

  <div class="chip c-tl"><svg viewBox="0 0 24 24" fill="#25D366"><path d="M12 2a10 10 0 0 0-8.6 15.1L2 22l5-1.3A10 10 0 1 0 12 2Z"/><path fill="#fff" d="M9 7.4c-.2-.4-.3-.4-.5-.4h-.5c-.2 0-.5.1-.7.3-.3.3-.9.9-.9 2.1s.9 2.4 1.1 2.6c.1.2 1.8 2.8 4.4 3.8 2.2.8 2.6.7 3.1.6.5-.1 1.4-.6 1.6-1.1.2-.6.2-1 .1-1.1-.1-.1-.3-.2-.5-.3l-1.5-.7c-.2-.1-.4-.1-.5.1l-.6.8c-.1.2-.3.2-.5.1-.3-.1-1.1-.4-2.1-1.3-.8-.7-1.3-1.5-1.4-1.7-.1-.2 0-.4.1-.5l.4-.4c.1-.2.2-.3.2-.5.1-.2 0-.3 0-.4L9 7.4Z"/></svg></div>
  <div class="chip c-tr"><svg viewBox="0 0 24 24"><path fill="#4285F4" d="M21 12.2c0-.7-.1-1.3-.2-1.9H12v3.7h5c-.2 1.2-.9 2.2-1.9 2.9v2.4h3.1c1.8-1.7 2.8-4.1 2.8-7.1Z"/><path fill="#34A853" d="M12 21c2.4 0 4.5-.8 6-2.2l-3.1-2.4c-.8.6-1.9.9-2.9.9-2.3 0-4.2-1.5-4.9-3.6H3.9v2.5C5.4 19 8.5 21 12 21Z"/><path fill="#FBBC05" d="M7.1 13.7c-.2-.6-.3-1.1-.3-1.7s.1-1.2.3-1.7V7.8H3.9C3.3 9 3 10.4 3 12s.3 3 .9 4.2l3.2-2.5Z"/><path fill="#EA4335" d="M12 6.7c1.3 0 2.5.5 3.4 1.3l2.7-2.7C16.5 3.9 14.4 3 12 3 8.5 3 5.4 5 3.9 7.8l3.2 2.5C7.8 8.2 9.7 6.7 12 6.7Z"/></svg></div>
  <div class="chip c-bl"><svg viewBox="0 0 24 24" fill="none" stroke="#0A7CFF" stroke-width="2.3" stroke-linecap="round"><path d="M3 12c1.6-4.2 4.2-5.2 5.7-2.6C10.2 12 11 14 12 14s1.8-2 3.3-4.6C16.8 6.8 19.4 7.8 21 12c-1.6 4.2-4.2 5.2-5.7 2.6C13.8 12 13 10 12 10s-1.8 2-3.3 4.6C7.2 17.2 4.6 16.2 3 12Z"/></svg></div>
  <div class="chip c-br"><svg viewBox="0 0 24 24" fill="none" stroke="#C2410C" stroke-width="2" stroke-linecap="round"><circle cx="6" cy="17" r="2.3"/><circle cx="18" cy="17" r="2.3"/><circle cx="12" cy="6" r="2.3"/><path d="M12 8.3 8.4 15M12 8.3 15.6 15M8.5 17h7"/></svg></div>

  <!-- orbs seguindo as linhas até o hub -->
  <div class="pulse p-tl"></div>
  <div class="pulse p-tr"></div>
  <div class="pulse p-bl"></div>
  <div class="pulse p-br"></div>

  <div class="hub-wrap"><div class="bloom"></div><div class="ring-a"></div><div class="ping"></div><div class="ping b"></div><div class="outer"><div class="sphere"><div class="core"><img src="logo_official.png" alt=""></div></div></div></div>
</div>
<script>(function(){var s=document.querySelector('.scene');function fit(){s.style.transform='scale('+Math.min(1,window.innerWidth/460)+')';}fit();addEventListener('resize',fit);})();</script>
</body></html>
