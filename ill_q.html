<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:transparent;display:flex;align-items:center;justify-content:center;font-family:'Geist',sans-serif;height:100vh;overflow:hidden}
  /* ── scene: sem box, sem borda, fundo funde com a seção ── */
  .scene{position:relative;width:460px;height:360px;flex-shrink:0;transform-origin:center center}
  .scene-bg{display:none}
  .grid{position:absolute;inset:0;z-index:1;background-image:linear-gradient(#C2D8F0 1px,transparent 1px),linear-gradient(90deg,#C2D8F0 1px,transparent 1px);background-size:30px 30px;opacity:.28;-webkit-mask-image:radial-gradient(circle at 28% 50%,#000 10%,transparent 60%);mask-image:radial-gradient(circle at 28% 50%,#000 10%,transparent 60%)}
  /* ── linhas SVG ── */
  .beam{position:absolute;inset:0;z-index:2;pointer-events:none;overflow:visible}
  /* ── anéis ── */
  .rings i{position:absolute;border-radius:50%;border:1px solid rgba(95,180,230,.22);transform:translate(-50%,-50%);display:block;left:130px;top:180px}
  .r1{width:118px;height:118px}.r2{width:186px;height:186px}.r3{width:252px;height:252px;border-style:dashed;border-color:rgba(95,180,230,.12)}
  .sweep{position:absolute;left:130px;top:180px;width:290px;height:290px;transform:translate(-50%,-50%);border-radius:50%;z-index:3;background:conic-gradient(from 0deg,rgba(95,180,230,.38),rgba(95,180,230,.08) 22%,rgba(95,180,230,0) 40%);-webkit-mask:radial-gradient(circle,#000 64%,transparent 70%);mask:radial-gradient(circle,#000 64%,transparent 70%);animation:spin 4.5s linear infinite}
  /* ── tiles ── */
  .tile{position:absolute;width:40px;height:40px;border-radius:11px;background:#fff;display:flex;align-items:center;justify-content:center;z-index:6;box-shadow:0 12px 22px rgba(0,40,93,.14),0 3px 7px rgba(0,40,93,.1),inset 0 0 0 1px rgba(255,255,255,.9)}
  .tile svg{width:21px;height:21px;stroke:#3A4655;fill:none;stroke-width:1.6}
  .t1{left:222px;top:72px;animation:float 5.5s ease-in-out infinite}
  .t2{left:112px;top:66px;animation:float 6s ease-in-out infinite 1.2s}
  .t3{left:90px;top:272px;animation:float 5.8s ease-in-out infinite .6s}
  .tq{left:196px;top:178px;box-shadow:0 14px 26px rgba(46,143,176,.3),0 0 0 2px #73C7E1,inset 0 0 0 1px #fff}
  .tq svg{stroke:#1E6F8C}
  .check{position:absolute;right:-7px;top:-7px;width:18px;height:18px;border-radius:50%;background:#1E9E75;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 5px rgba(0,0,0,.2)}
  .check svg{width:11px;height:11px;stroke:#fff;stroke-width:2.4;fill:none}
  /* ── hub ── */
  .hub-wrap{position:absolute;left:130px;top:180px;transform:translate(-50%,-50%);z-index:7;display:flex;align-items:center;justify-content:center}
  .bloom{position:absolute;width:158px;height:158px;border-radius:50%;z-index:0;background:radial-gradient(circle,rgba(115,199,225,.85) 0%,rgba(115,199,225,0) 66%);filter:blur(6px);animation:breathe 4s ease-in-out infinite}
  .outer{position:relative;z-index:2;width:104px;height:104px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 26px 56px rgba(0,40,93,.26),0 10px 20px rgba(0,40,93,.16),inset 0 0 0 1px rgba(255,255,255,.9)}
  .sphere{position:relative;width:78px;height:78px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 38% 26%,#3E7EC4 0%,#0B4486 46%,#00224F 100%);box-shadow:inset 0 -8px 16px rgba(0,6,24,.6),inset 0 8px 14px rgba(150,205,240,.45),0 5px 14px rgba(0,40,93,.3)}
  .sphere::before{content:"";position:absolute;top:7px;left:50%;transform:translateX(-50%);width:50px;height:26px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.6),rgba(255,255,255,0) 70%)}
  .core{position:relative;z-index:2;width:42px;height:42px;border-radius:12px;background:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 5px 12px rgba(0,16,48,.5)}
  .core img{width:26px;height:auto;display:block}
  /* ── glass card ── */
  .glass{position:absolute;right:14px;top:100px;width:186px;border-radius:16px;z-index:8;padding:14px 15px;background:rgba(255,255,255,.74);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.95);box-shadow:0 24px 46px rgba(0,40,93,.18),inset 0 1px 0 rgba(255,255,255,.6)}
  .gh{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px}
  .gh b{font-size:12px;font-weight:500;color:#00295D}
  .live{display:flex;align-items:center;gap:5px;font-size:9px;color:#1A6E8A;background:#DDF0F7;padding:3px 8px;border-radius:20px}
  .live i{width:5px;height:5px;border-radius:50%;background:#2E8FB0;animation:blink 1.4s infinite}
  .row{display:flex;justify-content:space-between;font-size:11px;margin-bottom:7px}
  .row span:first-child{color:#8A94A6}.row span:last-child{color:#00295D;font-weight:500}
  .gauge{display:flex;align-items:center;gap:10px;margin-top:11px;padding-top:11px;border-top:1px solid rgba(0,40,93,.08)}
  .gt{font-size:9px;padding:2px 7px;border-radius:5px;background:#E4F7EF;color:#137A57}
  .gt.b{background:#DDF0F7;color:#1A6E8A}
  /* ── orbs que seguem as linhas ── */
  .pulse{position:absolute;left:0;top:0;width:7px;height:7px;border-radius:50%;background:#9BE0F5;box-shadow:0 0 10px 3px rgba(120,205,240,.9),0 0 4px 1px rgba(115,199,225,.6);z-index:5}
  .p1{offset-path:path("M 242,92 L 130,180");-webkit-offset-path:path("M 242,92 L 130,180");animation:flowPath 2.6s ease-in infinite}
  .p2{offset-path:path("M 132,86 L 130,180");-webkit-offset-path:path("M 132,86 L 130,180");animation:flowPath 2.6s ease-in infinite .9s}
  .p3{offset-path:path("M 110,292 L 130,180");-webkit-offset-path:path("M 110,292 L 130,180");animation:flowPath 2.6s ease-in infinite 1.7s}
  .p4{offset-path:path("M 260,170 L 130,180");-webkit-offset-path:path("M 260,170 L 130,180");animation:flowPath 2.6s ease-in infinite .4s}
  @keyframes flowPath{0%{offset-distance:0%;opacity:0}15%{opacity:1}82%{opacity:1}100%{offset-distance:100%;opacity:0}}
  @keyframes spin{to{transform:translate(-50%,-50%) rotate(360deg)}}
  @keyframes breathe{0%,100%{opacity:.45;transform:scale(.92)}50%{opacity:.82;transform:scale(1.05)}}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
  @keyframes blink{0%,100%{opacity:.4}50%{opacity:1}}
  @keyframes gfill{0%{stroke-dashoffset:126}55%,100%{stroke-dashoffset:18}}
</style></head><body>
<div class="scene">
  <div class="scene-bg"></div>
  <div class="grid"></div>

  <!-- linhas SVG: tiles → hub (130,180) -->
  <svg class="beam" viewBox="0 0 460 360" xmlns="http://www.w3.org/2000/svg" overflow="visible">
    <defs>
      <linearGradient id="lq1" gradientUnits="userSpaceOnUse" x1="242" y1="92" x2="130" y2="180"><stop offset="0" stop-color="#73C7E1" stop-opacity=".7"/><stop offset="1" stop-color="#73C7E1" stop-opacity="0"/></linearGradient>
      <linearGradient id="lq2" gradientUnits="userSpaceOnUse" x1="132" y1="86" x2="130" y2="180"><stop offset="0" stop-color="#73C7E1" stop-opacity=".7"/><stop offset="1" stop-color="#73C7E1" stop-opacity="0"/></linearGradient>
      <linearGradient id="lq3" gradientUnits="userSpaceOnUse" x1="110" y1="292" x2="130" y2="180"><stop offset="0" stop-color="#73C7E1" stop-opacity=".7"/><stop offset="1" stop-color="#73C7E1" stop-opacity="0"/></linearGradient>
      <linearGradient id="lq4" gradientUnits="userSpaceOnUse" x1="260" y1="170" x2="130" y2="180"><stop offset="0" stop-color="#73C7E1" stop-opacity=".55"/><stop offset="1" stop-color="#73C7E1" stop-opacity="0"/></linearGradient>
    </defs>
    <line x1="242" y1="92" x2="130" y2="180" stroke="url(#lq1)" stroke-width="1.1" stroke-dasharray="5 4"/>
    <line x1="132" y1="86" x2="130" y2="180" stroke="url(#lq2)" stroke-width="1.1" stroke-dasharray="5 4"/>
    <line x1="110" y1="292" x2="130" y2="180" stroke="url(#lq3)" stroke-width="1.1" stroke-dasharray="5 4"/>
    <line x1="260" y1="170" x2="130" y2="180" stroke="url(#lq4)" stroke-width="1.1" stroke-dasharray="5 4"/>
  </svg>

  <div class="rings"><i class="r1"></i><i class="r2"></i><i class="r3"></i></div>
  <div class="sweep"></div>

  <div class="tile t1"><svg viewBox="0 0 24 24"><circle cx="12" cy="9" r="3.4"/><path d="M6 19a6 5 0 0 1 12 0"/></svg></div>
  <div class="tile t2"><svg viewBox="0 0 24 24"><circle cx="12" cy="9" r="3.4"/><path d="M6 19a6 5 0 0 1 12 0"/></svg></div>
  <div class="tile t3"><svg viewBox="0 0 24 24"><circle cx="12" cy="9" r="3.4"/><path d="M6 19a6 5 0 0 1 12 0"/></svg></div>
  <div class="tile tq"><svg viewBox="0 0 24 24"><circle cx="12" cy="9" r="3.4"/><path d="M6 19a6 5 0 0 1 12 0"/></svg><span class="check"><svg viewBox="0 0 24 24"><path d="M5 12l4 4 10-11"/></svg></span></div>

  <!-- orbs seguindo as linhas -->
  <div class="pulse p1"></div>
  <div class="pulse p2"></div>
  <div class="pulse p3"></div>
  <div class="pulse p4"></div>

  <div class="hub-wrap"><div class="bloom"></div><div class="outer"><div class="sphere"><div class="core"><img src="logo_official.png" alt=""></div></div></div></div>

  <div class="glass">
    <div class="gh"><b>Lead estruturado</b><span class="live"><i></i>IA</span></div>
    <div class="row"><span>Nome</span><span>João Martins</span></div>
    <div class="row"><span>Interesse</span><span>Imóvel · R$250k</span></div>
    <div class="row"><span>Origem</span><span>WhatsApp</span></div>
    <div class="gauge"><svg width="50" height="50" viewBox="0 0 50 50"><circle cx="25" cy="25" r="20" fill="none" stroke="#D5E3EE" stroke-width="5"/><circle cx="25" cy="25" r="20" fill="none" stroke="#2E8FB0" stroke-width="5" stroke-linecap="round" stroke-dasharray="126" stroke-dashoffset="126" transform="rotate(-90 25 25)" style="animation:gfill 3s ease-in-out infinite;filter:drop-shadow(0 0 3px rgba(46,143,176,.5))"/><text x="25" y="29" text-anchor="middle" font-family="Geist" font-size="14" font-weight="500" fill="#00295D">86</text></svg><div><div style="display:flex;gap:5px"><span class="gt">quente</span><span class="gt b">imóvel</span></div><p style="font-size:10px;color:#8A94A6;margin-top:6px">pronto p/ corretor</p></div></div>
  </div>
</div>
<script>(function(){var s=document.querySelector('.scene');function fit(){s.style.transform='scale('+Math.min(1,window.innerWidth/460)+')';}fit();addEventListener('resize',fit);})();</script>
</body></html>
