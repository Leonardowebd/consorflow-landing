<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shimmer Dot — monologue.to effect</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #1a1a1a;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 48px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: #fff;
    padding: 40px 20px;
  }

  h1 {
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #666;
  }

  /* ── Cards grid ─────────────────────────────────────── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 360px));
    gap: 24px;
    justify-content: center;
    width: 100%;
    max-width: 1160px;
  }

  .card {
    position: relative;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.14);
    background: linear-gradient(135deg, #282828 0%, #404040 100%);
    aspect-ratio: 0.83; /* 358 × 432 */
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 24px;
  }

  /* the canvas sits behind everything */
  .card canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
  }

  /*
    THIS is framer-1rfcfx3 / framer-g605b3 / framer-pfnm24 / framer-c7k66w
    It is a radial-gradient vignette that is transparent at the center
    and solid (#303030) at the edges — giving the "glow" illusion.
  */
  .vignette {
    position: absolute;
    inset: 0;
    z-index: 1;
    background: radial-gradient(50% 50%, #30303000 0%, #303030 100%);
    pointer-events: none;
  }

  /* card text sits above the vignette */
  .card-body {
    position: relative;
    z-index: 2;
  }

  .card-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
    margin-bottom: 10px;
  }

  .card-title {
    font-size: 19px;
    font-weight: 500;
    line-height: 1.35;
    color: #fff;
  }

  /* ── Controls panel ─────────────────────────────────── */
  .controls {
    background: #222;
    border: 1px solid #333;
    border-radius: 12px;
    padding: 24px 28px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 20px 32px;
    width: 100%;
    max-width: 800px;
  }

  .ctrl {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .ctrl label {
    font-size: 11px;
    color: #888;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    display: flex;
    justify-content: space-between;
  }

  .ctrl label span { color: #ddd; }

  .ctrl input[type=range] {
    -webkit-appearance: none;
    width: 100%;
    height: 4px;
    border-radius: 2px;
    background: #444;
    outline: none;
    cursor: pointer;
  }

  .ctrl input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #fff;
    cursor: pointer;
    transition: transform 0.1s;
  }

  .ctrl input[type=range]::-webkit-slider-thumb:hover {
    transform: scale(1.2);
  }

  .ctrl input[type=color] {
    -webkit-appearance: none;
    width: 100%;
    height: 32px;
    border: 1px solid #444;
    border-radius: 6px;
    background: none;
    cursor: pointer;
    padding: 2px 4px;
  }

  .ctrl select {
    background: #333;
    border: 1px solid #444;
    color: #fff;
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 13px;
    cursor: pointer;
    outline: none;
    width: 100%;
  }
</style>
</head>
<body>

<h1>Shimmer Dot · monologue.to</h1>

<div class="grid">
  <div class="card" id="card1">
    <canvas id="cv1"></canvas>
    <div class="vignette"></div>
    <div class="card-body">
      <div class="card-label">Feature</div>
      <p class="card-title">Your unique vocabulary, automatically saved.</p>
    </div>
  </div>

  <div class="card" id="card2">
    <canvas id="cv2"></canvas>
    <div class="vignette"></div>
    <div class="card-body">
      <div class="card-label">Feature</div>
      <p class="card-title">Write like you like to speak, effortlessly.</p>
    </div>
  </div>

  <div class="card" id="card3">
    <canvas id="cv3"></canvas>
    <div class="vignette"></div>
    <div class="card-body">
      <div class="card-label">Feature</div>
      <p class="card-title">Automatic cleanup, so you write what you meant.</p>
    </div>
  </div>
</div>

<!-- Live controls -->
<div class="controls">
  <div class="ctrl">
    <label>Dot size (px) <span id="lbl-size">3</span></label>
    <input type="range" id="ctrl-size" min="1" max="10" value="3" step="1">
  </div>
  <div class="ctrl">
    <label>Gap (px) <span id="lbl-gap">8</span></label>
    <input type="range" id="ctrl-gap" min="1" max="20" value="8" step="1">
  </div>
  <div class="ctrl">
    <label>Speed (fps) <span id="lbl-speed">12</span></label>
    <input type="range" id="ctrl-speed" min="1" max="60" value="12" step="1">
  </div>
  <div class="ctrl">
    <label>Contrast <span id="lbl-contrast">0</span></label>
    <input type="range" id="ctrl-contrast" min="-5" max="5" value="0" step="0.5">
  </div>
  <div class="ctrl">
    <label>Dot color</label>
    <input type="color" id="ctrl-color" value="#808080">
  </div>
  <div class="ctrl">
    <label>Shape</label>
    <select id="ctrl-shape">
      <option value="Square">Square</option>
      <option value="Circle">Circle</option>
    </select>
  </div>
</div>

<script>
  // ── Config (mirrors Shimmer Dot defaultProps) ────────────────────────────
  const cfg = {
    size:     3,
    gap:      8,
    speed:    12,    // fps
    contrast: 0,
    color:    [128, 128, 128],
    shape:    "Square",
  };

  // ── Contrast curve (same math extracted from bundle) ────────────────────
  // Pulls the random alpha toward dark (contrast > 0) or bright (< 0)
  function randomAlpha() {
    let e = Math.random();
    if (cfg.contrast > 0)      e = e ** (1 + cfg.contrast / 5);
    else if (cfg.contrast < 0) e = 1 - (1 - e) ** (1 - cfg.contrast / 5);
    return e;
  }

  // ── Draw a single frame on a canvas ─────────────────────────────────────
  function draw(canvas) {
    const ctx = canvas._ctx;
    const w = canvas.width  = canvas.offsetWidth;
    const h = canvas.height = canvas.offsetHeight;
    ctx.clearRect(0, 0, w, h);

    const [r, g, b] = cfg.color;
    const step = cfg.size + cfg.gap;

    for (let y = 0; y < h; y += step) {
      for (let x = 0; x < w; x += step) {
        const a = randomAlpha();
        ctx.fillStyle = `rgba(${r},${g},${b},${a})`;

        if (cfg.shape === "Square") {
          ctx.fillRect(x, y, cfg.size, cfg.size);
        } else {
          const r2 = cfg.size / 2;
          ctx.beginPath();
          ctx.arc(x + r2, y + r2, r2, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }
  }

  // ── Setup each canvas ────────────────────────────────────────────────────
  const canvases = ["cv1","cv2","cv3"].map(id => {
    const cv = document.getElementById(id);
    cv._ctx = cv.getContext("2d");

    // redraw when card resizes
    const ro = new ResizeObserver(() => draw(cv));
    ro.observe(cv.parentElement);

    return cv;
  });

  // ── Animation loop ───────────────────────────────────────────────────────
  let raf, lastTime = 0;

  function loop(ts) {
    raf = requestAnimationFrame(loop);
    const interval = 1000 / cfg.speed;
    if (ts - lastTime < interval) return;
    lastTime = ts;
    canvases.forEach(draw);
  }

  raf = requestAnimationFrame(loop);

  // ── Controls ─────────────────────────────────────────────────────────────
  function bind(id, lblId, key, parse = Number) {
    const el  = document.getElementById(id);
    const lbl = document.getElementById(lblId);
    el.addEventListener("input", () => {
      cfg[key] = parse(el.value);
      if (lbl) lbl.textContent = el.value;
    });
  }

  bind("ctrl-size",     "lbl-size",     "size");
  bind("ctrl-gap",      "lbl-gap",      "gap");
  bind("ctrl-speed",    "lbl-speed",    "speed");
  bind("ctrl-contrast", "lbl-contrast", "contrast");

  document.getElementById("ctrl-shape").addEventListener("change", e => {
    cfg.shape = e.target.value;
  });

  document.getElementById("ctrl-color").addEventListener("input", e => {
    const hex = e.target.value;
    cfg.color = [
      parseInt(hex.slice(1,3), 16),
      parseInt(hex.slice(3,5), 16),
      parseInt(hex.slice(5,7), 16),
    ];
  });
</script>
</body>
</html>
