name: Blog draft notify

on:
  push:
    branches:
      - main
    paths:
      - "blog/_tools/posts/pending/**"

permissions:
  contents: write

concurrency:
  group: blog-telegram
  cancel-in-progress: false

jobs:
  notify:
    if: ${{ !contains(github.event.head_commit.message, '[skip-notify]') }}
    runs-on: ubuntu-latest
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --upgrade Pillow google-genai

      - name: Configure Git author
        run: |
          git config user.name "Consorflow Bot"
          git config user.email "nleo17000@gmail.com"

      - name: Send added drafts to Telegram
        run: |
          set -euo pipefail
          added="$(git diff --name-only --diff-filter=A HEAD^ HEAD -- 'blog/_tools/posts/pending/*.json' || true)"

          if [ -z "$added" ]; then
            echo "No new pending blog drafts to notify."
            exit 0
          fi

          while IFS= read -r file; do
            rel="${file#blog/_tools/}"
            echo "Sending draft to Telegram: $rel"
            (cd blog/_tools && python enviar_telegram.py "$rel")
          done <<< "$added"

      - name: Commit generated preview assets
        run: |
          set -euo pipefail
          if [ -z "$(git status --porcelain -- blog/_tools/posts/pending/assets)" ]; then
            echo "No generated preview assets to commit."
            exit 0
          fi

          git add blog/_tools/posts/pending/assets
          git commit -m "blog: gera assets de preview [skip-notify]"
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Listen for approval and publish quickly
        run: |
          set -euo pipefail
          deadline=$((SECONDS + 2400))

          while [ "$SECONDS" -lt "$deadline" ]; do
            if ! compgen -G "blog/_tools/posts/pending/*.json" > /dev/null; then
              echo "No pending drafts left. Exiting listener."
              exit 0
            fi

            git pull --rebase origin main
            python3 blog/_tools/publicar_pendentes.py

            if ! compgen -G "blog/_tools/posts/pending/*.json" > /dev/null; then
              echo "No pending drafts left after publishing."
              exit 0
            fi

            sleep 20
          done

          echo "Approval listener timed out after 40 minutes."
